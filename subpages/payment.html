<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout – Cara</title>
    <link rel="icon" href="../img/favicon.ico">
    <link rel="stylesheet" href="../style.css">
    <style>
        .checkout-section {max-width: 1200px;margin: 40px auto;padding: 20px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.05);border-radius:8px;}
        .checkout-section h2 {font-size:2rem;margin-bottom:1rem;color:#088178;}
        .order-summary, .billing-form {margin-bottom:30px;}
        .order-summary table {width:100%;border-collapse:collapse;}
        .order-summary th, .order-summary td {padding:12px;text-align:left;border-bottom:1px solid #eaeaea;}
        .order-summary th {background:#f5f5f5;}
        .billing-form label {display:block;margin-bottom:5px;font-weight:600;}
        .billing-form input, .billing-form select {width:100%;padding:10px;margin-bottom:15px;border:1px solid #cce7d0;border-radius:4px;}
        .payment-methods img {max-height:30px;margin-right:10px;vertical-align:middle;}
        .place-order {display:inline-block;background:#088178;color:#fff;padding:12px 30px;border:none;border-radius:4px;cursor:pointer;transition:.3s ease;}
        .place-order:hover {background:#06614f;}
    </style>
</head>
<body>
    <!-- Re‑use the same header as the main site -->
    <header id="Header">
        <a href="../index.html"><img src="../img/logo.png" alt="Cara" class="logo"></a>
        <div>
            <ul id="navbar">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../#feature">Shop</a></li>
                <li><a href="../#product1">Products</a></li>
                <li><a href="../#banner">About</a></li>
                <li><a href="../#sm-banner">Contact</a></li>
                <li class="lg-bag"><a href="cart.html"><i class="fa-solid fa-bag-shopping head-Cart"></i></a></li>
            </ul>
        </div>
    </header>

    <section class="checkout-section">
        <h2>Checkout</h2>
        <div class="order-summary">
            <h3>Order Summary</h3>
            <table>
                <thead>
                    <tr><th>Product</th><th>Qty</th><th>Price</th></tr>
                </thead>
                <tbody>
                    <tr><td>Sample Product 1</td><td>2</td><td>$129</td></tr>
                    <tr><td>Sample Product 2</td><td>1</td><td>$69</td></tr>
                </tbody>
                <tfoot>
                    <tr><th colspan="2">Total</th><th>$327</th></tr>
                </tfoot>
            </table>
        </div>
        <div class="billing-form">
            <h3>Billing Details</h3>
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="John Doe">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="john@example.com">
            <label for="address">Address</label>
            <input type="text" id="address" placeholder="123 Main St, City">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="City">
            <label for="zip">ZIP / Postal Code</label>
            <input type="text" id="zip" placeholder="12345">
        </div>
        <div class="payment-methods">
            <h3>Payment Method</h3>
            <p>Choose your preferred method:</p>
            <img src="../img/pay/visa.png" alt="Visa">
            <img src="../img/pay/mastercard.png" alt="MasterCard">
            <img src="../img/pay/paypal.png" alt="PayPal">
        </div>
        <button class="place-order">Place Order</button>
    </section>

    <footer>
        <p style="text-align:center;margin-top:40px;">©2023 Anurag Kumar. All Rights Reserved.</p>
    </footer>
</body>
</html>
